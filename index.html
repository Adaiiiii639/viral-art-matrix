<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Color Matrix | Interactive Art</title>
    <style>
        /* 基础重置与暗黑背景 */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden; /* 隐藏滚动条 */
        }

        /* 画布填满屏幕 */
        canvas {
            display: block; position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* 顶部标题UI区 - 毛玻璃效果 */
        .header {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            z-index: 10; text-align: center; pointer-events: none;
        }
        h1 {
            font-weight: 300; letter-spacing: 4px; font-size: 28px; margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        p {
            font-weight: 300; color: #aaa; letter-spacing: 2px; font-size: 14px;
        }

        /* 中央即时反馈文字 */
        #feedback-text {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5; font-size: 20px; font-weight: 300; letter-spacing: 3px;
            color: rgba(255, 255, 255, 0); transition: color 0.8s ease; pointer-events: none;
            text-align: center;
        }

        /* 底部交互控制台 - 高级悬浮感 */
        .controls {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
            background: rgba(255, 255, 255, 0.05); padding: 20px 30px;
            border-radius: 20px; backdrop-filter: blur(15px); /* 毛玻璃核心代码 */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* 交互按钮设计 */
        button {
            background: transparent; color: #fff; font-size: 14px; letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.3); padding: 10px 20px;
            border-radius: 30px; cursor: pointer; transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.15); border-color: #fff;
            transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>VIRAL COLOR MATRIX</h1>
        <p>Interactive Pathogen Sensor Simulation</p>
    </div>

    <div id="feedback-text">Awaiting Target Selection...</div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button onclick="changeState('Flu A', '#FFA500', 1.5, 'Initiating Flu A Reaction...')">Flu A (Orange G)</button>
        <button onclick="changeState('H1N1', '#FF4500', 2.5, 'Detecting H1N1 Strain...')">H1N1 (Phenol Red)</button>
        <button onclick="changeState('SARS-CoV-2', '#00CED1', 0.8, 'Isolating SARS-CoV-2...')">SARS-CoV-2 (BTB)</button>
        <button onclick="changeState('Multiplex', '#FF1493', 3.0, 'Multiplex Collision Mode Active')">Multiplex Mixed</button>
        <button onclick="changeState('Reset', '#ffffff', 0.5, 'System Calibrating...')">Reset System</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const feedbackText = document.getElementById('feedback-text');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        // 默认粒子颜色和速度
        let currentColor = { r: 255, g: 255, b: 255 };
        let targetColor = { r: 255, g: 255, b: 255 };
        let globalSpeedMultiplier = 0.5;

        // 鼠标交互对象
        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x; mouse.y = event.y;
        });
        window.addEventListener('mouseout', function() {
            mouse.x = null; mouse.y = null;
        });
        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            init();
        });

        // 辅助函数：十六进制转RGB
        function hexToRgb(hex) {
            let bigint = parseInt(hex.replace('#', ''), 16);
            return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
        }

        // 核心函数：点击按钮改变状态和UI反馈
        function changeState(targetName, hexColor, speed, message) {
            targetColor = hexToRgb(hexColor);
            globalSpeedMultiplier = speed;
            
            // 触发反馈文字动画
            feedbackText.innerText = message;
            feedbackText.style.color = `rgba(${targetColor.r}, ${targetColor.g}, ${targetColor.b}, 0.8)`;
            feedbackText.style.textShadow = `0 0 20px rgba(${targetColor.r}, ${targetColor.g}, ${targetColor.b}, 0.5)`;
            
            // 3秒后文字渐渐消失
            setTimeout(() => {
                feedbackText.style.color = "rgba(255, 255, 255, 0)";
                feedbackText.style.textShadow = "none";
            }, 3000);
        }

        // 粒子类定义
        class Particle {
            constructor(x, y, directionX, directionY, size) {
                this.x = x; this.y = y;
                this.directionX = directionX; this.directionY = directionY;
                this.size = size;
                this.baseX = this.x; this.baseY = this.y;
            }
            // 绘制粒子
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = `rgba(${currentColor.r}, ${currentColor.g}, ${currentColor.b}, 0.8)`;
                ctx.fill();
            }
            // 粒子运动与鼠标交互物理逻辑
            update() {
                // 碰到边缘反弹
                if (this.x > canvas.width || this.x < 0) { this.directionX = -this.directionX; }
                if (this.y > canvas.height || this.y < 0) { this.directionY = -this.directionY; }

                // 鼠标排斥计算
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius) {
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let force = (mouse.radius - distance) / mouse.radius;
                    this.x -= forceDirectionX * force * 5;
                    this.y -= forceDirectionY * force * 5;
                } else {
                    // 自然漂浮移动
                    this.x += this.directionX * globalSpeedMultiplier;
                    this.y += this.directionY * globalSpeedMultiplier;
                }
                this.draw();
            }
        }

        // 初始化粒子群
        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1;
                let directionY = (Math.random() * 2) - 1;
                particlesArray.push(new Particle(x, y, directionX, directionY, size));
            }
        }

        // 连线逻辑：粒子靠近时生成发光连线
        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                                   ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        let opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = `rgba(${currentColor.r}, ${currentColor.g}, ${currentColor.b}, ${opacityValue})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // 动画主循环
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            
            // 颜色平滑过渡算法 (Ease-in effect)
            currentColor.r += (targetColor.r - currentColor.r) * 0.05;
            currentColor.g += (targetColor.g - currentColor.g) * 0.05;
            currentColor.b += (targetColor.b - currentColor.b) * 0.05;

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        init();
        animate();
    </script>
</body>
</html>
